<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kontaktformular | KP Plattner GmbH</title>
  <style>
    :root {
      --bg: #f5f5f3;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #d9d9d6;
      --accent: #1f2933;
      --accent-hover: #374151;
      --success: #0f766e;
      --error: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.2;
    }

    .intro {
      margin: 0 0 28px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .field {
      margin-bottom: 18px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      background: #fff;
      color: var(--text);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: 2px solid rgba(31, 41, 51, 0.18);
      border-color: var(--accent);
    }

    .checkbox {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin: 6px 0 24px;
      color: var(--muted);
      font-size: 14px;
    }

    .checkbox input {
      width: auto;
      margin-top: 4px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover {
      background: var(--accent-hover);
    }

    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      display: none;
      font-weight: 700;
    }

    .status.success {
      display: block;
      color: var(--success);
      background: rgba(15, 118, 110, 0.1);
    }

    .status.error {
      display: block;
      color: var(--error);
      background: rgba(185, 28, 28, 0.1);
    }

    .small {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .card {
        padding: 24px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card" aria-labelledby="form-title">
      <h1 id="form-title">Anfrageformular</h1>
      <p class="intro">Bitte füllen Sie das Formular aus. Wir melden uns zeitnah bei Ihnen.</p>

      <form id="contactForm">
        <div class="grid">
          <div class="field">
            <label for="name">Name *</label>
            <input id="name" name="name" type="text" autocomplete="name" required />
          </div>

          <div class="field">
            <label for="company">Firma</label>
            <input id="company" name="company" type="text" autocomplete="organization" />
          </div>

          <div class="field">
            <label for="email">E-Mail *</label>
            <input id="email" name="email" type="email" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="phone">Telefon</label>
            <input id="phone" name="phone" type="tel" autocomplete="tel" />
          </div>

          <div class="field full">
            <label for="subject">Betreff *</label>
            <select id="subject" name="subject" required>
              <option value="">Bitte auswählen</option>
              <option value="Allgemeine Anfrage">Allgemeine Anfrage</option>
              <option value="Angebotsanfrage">Angebotsanfrage</option>
              <option value="Rückruf erbeten">Rückruf erbeten</option>
              <option value="Sonstiges">Sonstiges</option>
            </select>
          </div>

          <div class="field full">
            <label for="message">Nachricht *</label>
            <textarea id="message" name="message" required></textarea>
          </div>
        </div>

        <label class="checkbox">
          <input id="privacy" name="privacy" type="checkbox" required />
          <span>Ich stimme zu, dass meine Angaben zur Bearbeitung der Anfrage verarbeitet werden. *</span>
        </label>

        <button id="submitButton" type="submit">Absenden</button>
        <div id="status" class="status" role="status" aria-live="polite"></div>

        <p class="small">* Pflichtfelder</p>
      </form>
    </section>
  </main>

  <script>
    // WICHTIG:
    // Diese HTML-Datei sendet die Formulardaten an ein sicheres Backend.
    // Der Brevo API-Key darf NICHT direkt in dieser HTML-Datei stehen.
    // Trage hier die URL deines Backends ein, z. B. eine Netlify Function, Vercel Function oder ein PHP-Script am Server.
    const FORM_ENDPOINT = "/.netlify/functions/send-form";

    const form = document.getElementById("contactForm");
    const button = document.getElementById("submitButton");
    const statusBox = document.getElementById("status");

    function showStatus(type, message) {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      button.disabled = true;
      button.textContent = "Wird gesendet ...";
      statusBox.className = "status";
      statusBox.textContent = "";

      const formData = Object.fromEntries(new FormData(form).entries());

      try {
        const response = await fetch(FORM_ENDPOINT, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(formData)
        });

        if (!response.ok) {
          throw new Error("Formular konnte nicht gesendet werden.");
        }

        showStatus("success", "Vielen Dank. Ihre Anfrage wurde erfolgreich gesendet.");
        form.reset();
      } catch (error) {
        showStatus("error", "Leider ist ein Fehler aufgetreten. Bitte versuchen Sie es später erneut oder kontaktieren Sie uns direkt per E-Mail.");
      } finally {
        button.disabled = false;
        button.textContent = "Absenden";
      }
    });
  </script>
</body>
</html>
